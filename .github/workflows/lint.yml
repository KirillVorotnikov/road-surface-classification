name: Lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check src/ scripts/ tests/

      - name: Check linting
        run: ruff check src/ scripts/ tests/