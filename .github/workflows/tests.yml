name: Tests

on:
  pull_request:
    paths:
      - 'src/core/**'
      - 'src/audio/**'
      - 'tests/**'
      - 'pyproject.toml'
  push:
    branches: [main, develop]

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run core tests
        env:
          MLFLOW_TRACKING_URI: ""
        run: pytest tests/core/ -v --tb=short

  audio-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run audio tests
        run: pytest tests/audio/ -v --tb=short -k "not test_extract"