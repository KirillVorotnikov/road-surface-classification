# Training Configuration for Road Surface Classification
# =======================================================
# Use with Hydra: python scripts/train.py --config-name train_config

# Experiment name (used for MLflow)
experiment_name: road-surface-audio

# Project root directory
project_root: ${hydra:runtime.cwd}

# Data paths
data:
  raw_dir: ${project_root}/data/raw
  processed_dir: ${project_root}/data/processed
  cache_dir: ${project_root}/data/cache

# Model configuration
model:
  name: resnet18
  pretrained: true
  num_classes: 5  # asphalt, concrete, gravel, dirt, snow
  dropout: 0.2

  # Audio-specific settings
  audio:
    sample_rate: 16000
    n_mels: 128
    n_fft: 2048
    hop_length: 512
    win_length: 2048

# Training configuration
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 10  # Early stopping patience

  # Optimizer
  optimizer: adamw
  scheduler: cosine

  # Mixed precision
  amp: true

  # Gradient clipping
  grad_clip: 1.0

# Validation configuration
validation:
  val_split: 0.2
  num_workers: 4

# Data augmentation
augmentations:
  enabled: true
  noise_std: 0.005
  time_stretch_range: [0.9, 1.1]
  pitch_shift_range: [-2, 2]
  gain_range: [-6, 6]

# MLflow tracking
mlflow:
  enabled: true
  tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,}
  experiment_name: ${experiment_name}
  artifact_location: ${oc.env:BUCKET_NAME,road-surface-classification}
  log_every_n_epochs: 1
  log_model: true
  log_figures: true

# Checkpointing
checkpoint:
  dir: ${project_root}/checkpoints
  save_top_k: 3
  monitor: val/loss
  mode: min
  filename: "{epoch:02d}-{val/loss:.4f}"

# Device configuration
device:
  accelerator: gpu
  device_ids: [0]
  num_workers: 4

# Random seed for reproducibility
seed: 42

# Hydra output directory
hydra:
  run:
    dir: ${project_root}/outputs/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${project_root}/outputs/${experiment_name}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
